name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      core: ${{ steps.filter.outputs.core }}
      tests: ${{ steps.filter.outputs.tests }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            core:
              - 'core/src/**'
              - 'core/include/**'
              - 'core/CMakeLists.txt'
              - 'CMakeLists.txt'
            tests:
              - 'core/tests/**'

  build-and-test:
    name: Build, Test and Coverage
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.core == 'true' || needs.changes.outputs.tests == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache CMake dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: ${{ runner.os }}-cmake-deps-${{ hashFiles('CMakeLists.txt', 'core/CMakeLists.txt', 'core/tests/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-cmake-deps-

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            build-essential \
            libmysqlclient-dev \
            pkg-config \
            ccache

      - name: Setup ccache
        run: |
          ccache --set-config=max_size=500M
          ccache --zero-stats

      - name: Configure CMake with coverage
        env:
          CC: ccache gcc
          CXX: ccache g++
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DMES_ENABLE_COVERAGE=ON

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Show ccache statistics
        run: ccache --show-stats

      - name: Run tests
        run: ctest --test-dir build --output-on-failure --parallel $(nproc)

      - name: Generate coverage report
        run: |
          sudo apt-get install -y lcov
          lcov --capture --directory build --output-file coverage.info --ignore-errors mismatch
          lcov --remove coverage.info '/usr/*' '*/tests/*' '*/build/_deps/*' --output-file coverage.info --ignore-errors mismatch
          lcov --list coverage.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.info
          flags: unittests
          name: codecov-mes
          fail_ci_if_error: false

      - name: Upload build artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build/CMakeFiles/*.log
            build/Testing/Temporary/
