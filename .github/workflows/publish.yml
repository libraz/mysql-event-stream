name: Publish and Create Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write

jobs:
  e2e-release:
    uses: ./.github/workflows/e2e.yml
    with:
      targets_json: '["mysql:8.4","mysql:9.1","mariadb:10.11","mariadb:11.4"]'

  publish-npm:
    needs: [e2e-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22.22.1'
          registry-url: 'https://registry.npmjs.org'

      # Trusted publishing (OIDC) needs a recent npm; the bundled one is too old.
      - run: npm install -g npm@latest
      - run: corepack enable
      - run: corepack prepare yarn@4.9.1 --activate

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libssl-dev zlib1g-dev pkg-config

      - name: Build C++ core
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel

      - name: Build and test Node.js binding
        working-directory: bindings/node
        run: |
          yarn install --immutable
          yarn build
          yarn check
          yarn test

      - name: Publish main package
        working-directory: bindings/node
        run: |
          version="$(node -p "require('./package.json').version")"
          name="$(node -p "require('./package.json').name")"
          if npm view "$name@$version" version >/dev/null 2>&1; then
            echo "::notice::$name@$version already published, skipping"
          else
            npm publish --access public --provenance
          fi

  python-wheels:
    needs: [e2e-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            deployment_target: ''
          - os: ubuntu-24.04-arm
            arch: aarch64
            deployment_target: ''
          - os: macos-15-intel
            arch: x86_64
            deployment_target: '15.0'
          - os: macos-15
            arch: arm64
            deployment_target: '15.0'
    runs-on: ${{ matrix.os }}
    env:
      CIBW_ARCHS: ${{ matrix.arch }}
      CIBW_ENVIRONMENT_MACOS: MACOSX_DEPLOYMENT_TARGET=${{ matrix.deployment_target }}
      MACOSX_DEPLOYMENT_TARGET: ${{ matrix.deployment_target }}
    steps:
      - uses: actions/checkout@v7

      - name: Install CMake (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake

      - name: Build and validate wheels
        uses: pypa/cibuildwheel@v4.1.0
        with:
          package-dir: bindings/python
          output-dir: wheelhouse
          config-file: bindings/python/pyproject.toml

      - name: Verify and clean-install macOS wheel on minimum runtime
        if: runner.os == 'macOS'
        run: |
          host_major="$(sw_vers -productVersion | cut -d. -f1)"
          target_major="${MACOSX_DEPLOYMENT_TARGET%%.*}"
          test "$host_major" = "$target_major"

          wheel="$(find wheelhouse -name "*macosx_15_0_${{ matrix.arch }}.whl" -print -quit)"
          test -n "$wheel"
          inspect_dir="$(mktemp -d)"
          unzip -q "$wheel" -d "$inspect_dir"
          library="$(find "$inspect_dir" -name 'libmes.dylib' -print -quit)"
          test -n "$library"
          otool -l "$library" > "$RUNNER_TEMP/libmes-load-commands.txt"
          grep -A5 LC_BUILD_VERSION "$RUNNER_TEMP/libmes-load-commands.txt" | grep -q 'minos 15.0'

          python3 -m venv "$RUNNER_TEMP/wheel-smoke"
          "$RUNNER_TEMP/wheel-smoke/bin/pip" install "$wheel"
          "$RUNNER_TEMP/wheel-smoke/bin/python" -c "from mysql_event_stream import CdcEngine; engine = CdcEngine(); engine.feed(b''); engine.close()"

      - uses: actions/upload-artifact@v7
        with:
          name: wheel-${{ matrix.os }}-${{ matrix.arch }}
          path: wheelhouse/*.whl

  publish-pypi:
    needs: [python-wheels]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/mysql-event-stream
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheel-*
          path: dist/
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          # Tolerate re-runs where this version's files are already on PyPI.
          skip-existing: true

  create-release:
    needs: [publish-npm, publish-pypi]
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
