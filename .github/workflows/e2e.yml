name: Protocol E2E

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      targets_json:
        description: JSON array of database targets
        required: false
        type: string
        default: '["mysql:8.4","mysql:9.1","mariadb:10.11","mariadb:11.4"]'

concurrency:
  group: protocol-e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  e2e:
    name: C++ / Node / Python (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(inputs.targets_json != '' && inputs.targets_json || '["mysql:8.4","mysql:9.1","mariadb:10.11","mariadb:11.4"]') }}

    steps:
      - uses: actions/checkout@v7

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libssl-dev pkg-config zlib1g-dev

      - uses: actions/setup-node@v6
        with:
          node-version: '22.22.1'
      - run: corepack enable && corepack prepare yarn@4.9.1 --activate

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Build C++ core and tests
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel "$(nproc)"

      - name: Build Node addon
        working-directory: bindings/node
        run: |
          yarn install --immutable
          yarn build

      - name: Install Python binding and test dependencies
        working-directory: bindings/python
        run: python -m pip install -e '.[dev]'

      - name: Run real-server cross-surface matrix target
        run: ./e2e/run-matrix.sh --only '${{ matrix.target }}'

      - name: Capture database logs on failure
        if: failure()
        run: |
          docker ps -a
          docker compose -f e2e/docker/docker-compose.yml logs --no-color > mysql-e2e.log 2>&1 || true
          docker compose -f e2e/docker/docker-compose.mariadb.yml logs --no-color > mariadb-e2e.log 2>&1 || true

      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: e2e-logs-${{ strategy.job-index }}
          path: '*-e2e.log'
          if-no-files-found: ignore

      - name: Tear down test databases
        if: always()
        run: |
          docker compose -f e2e/docker/docker-compose.yml down -v || true
          docker compose -f e2e/docker/docker-compose.mariadb.yml down -v || true
          docker compose -f bindings/node/e2e/docker/docker-compose.yml down -v || true
          docker compose -f bindings/node/e2e/docker/docker-compose.mariadb.yml down -v || true
