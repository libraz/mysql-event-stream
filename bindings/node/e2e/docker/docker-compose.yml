services:
  mysql:
    image: mysql:${MYSQL_VERSION:-8.4}
    container_name: mes_node_test_mysql
    ports:
      - "13307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: test_root_password
      MYSQL_DATABASE: mes_test
    command:
      - --server-id=3
      - --log-bin=mysql-bin
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
      - --binlog-row-image=FULL
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mes_node_test_mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ptest_root_password"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

volumes:
  mes_node_test_mysql_data:
