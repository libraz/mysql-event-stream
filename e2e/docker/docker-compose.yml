services:
  mysql:
    image: mysql:${MYSQL_VERSION:-8.4}
    container_name: mes_test_mysql
    ports:
      - "13308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: test_root_password
      MYSQL_DATABASE: mes_test
    command:
      - --server-id=2
      - --log-bin=mysql-bin
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
      - --binlog-row-image=FULL
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --ssl-ca=/etc/mysql/certs/ca.pem
      - --ssl-cert=/etc/mysql/certs/server-cert.pem
      - --ssl-key=/etc/mysql/certs/server-key.pem
      - --require-secure-transport=OFF
    volumes:
      - mes_test_mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
      - ./certs:/etc/mysql/certs:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ptest_root_password"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

volumes:
  mes_test_mysql_data:
